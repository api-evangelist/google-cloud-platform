specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Google Cloud Platform
providerId: google-cloud-platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Platform
  - IaaS
  - PaaS
  - Google Cloud
  - Multi-Product
description: Google Cloud is a multi-product platform priced per service rather than per overall tier.
  Most services follow Pay-As-You-Go list prices documented on per-service pricing pages, with optional
  Committed Use Discounts (CUDs - 1y or 3y) and Sustained Use Discounts (SUDs) layered on top. New customers
  receive $300 of free trial credit (90 days) and an Always Free tier provides perpetual zero-cost quotas
  for representative services.
sources:
  - https://cloud.google.com/pricing
  - https://cloud.google.com/free
  - https://cloud.google.com/pricing/list
plans:
  - id: google-cloud-platform-overview
    name: Platform Pricing Overview
    type: pay-as-you-go
    description: Default Pay-As-You-Go list pricing for all Google Cloud services. Prices vary per service,
      region, and SKU; consult the per-service pricing page or use the Pricing Calculator for an exact
      quote.
    entries:
      - label: Per-service usage
        description: Each Google Cloud service is metered with its own SKUs and unit prices
        name: per_service_usage
        type: metered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: Compute Engine
      - name: Cloud Storage
      - name: BigQuery
      - name: Cloud SQL / AlloyDB / Spanner
      - name: Cloud Run / Cloud Functions / GKE
      - name: Vertex AI / Gemini API
      - name: Networking + Load Balancing
      - name: Operations (Logging / Monitoring / Trace)
  - id: google-cloud-platform-free-trial
    name: Free Trial
    type: freemium
    description: 90-day free trial for new customers with USD 300 in promotional credit usable across
      most GCP services. Credit is consumed against PAYG list prices.
    entries:
      - label: Trial credit
        description: One-time promotional credit for new accounts
        name: trial_credit
        type: flat
        metric: USD
        limit: 300
        timeFrame: usage
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Trial duration
        description: Maximum trial period
        name: trial_duration
        type: quota
        metric: day
        limit: 90
        timeFrame: usage
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Access to all GCP services
      - name: Auto-stops at credit exhaustion or 90 days
  - id: google-cloud-platform-always-free
    name: Always Free
    type: freemium
    description: Perpetual zero-cost monthly quotas across representative services (subject to per-service
      caveats and US-region restrictions for some quotas).
    entries:
      - label: Compute Engine e2-micro
        description: One non-preemptible e2-micro per month in eligible US regions
        name: free_compute
        type: quota
        metric: instance-month
        limit: 1
        timeFrame: month
        geo: US
        domains:
          - https://compute.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Cloud Storage standard
        description: 5 GB-month of standard storage in US multi-region
        name: free_storage
        type: quota
        metric: GB
        limit: 5
        timeFrame: month
        geo: US
        domains:
          - https://storage.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: BigQuery query
        description: 1 TB of on-demand query bytes per month
        name: free_bq_query
        type: quota
        metric: TB
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://bigquery.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: BigQuery storage
        description: 10 GB of active storage per month
        name: free_bq_storage
        type: quota
        metric: GB
        limit: 10
        timeFrame: month
        geo: global
        domains:
          - https://bigquery.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Pub/Sub
        description: 10 GB of message ingress per month
        name: free_pubsub
        type: quota
        metric: GB
        limit: 10
        timeFrame: month
        geo: global
        domains:
          - https://pubsub.googleapis.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Always-free monthly quotas across many services
      - name: Continues after trial credit is consumed
  - id: google-cloud-platform-committed-use
    name: Committed Use Discount
    type: subscription
    description: 1-year or 3-year commitments to a specific resource SKU and region in exchange for a
      discounted rate. Resource-based CUDs apply to Compute Engine, GKE, Cloud SQL, Spanner, etc.; spend-based
      CUDs apply to Compute Engine and Cloud Run.
    entries:
      - label: 1-year commit
        description: Discount for 1-year resource or spend commitment
        name: cud_1y
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: see CUD pricing
        userMultiplied: false
      - label: 3-year commit
        description: Discount for 3-year resource or spend commitment (deeper discount)
        name: cud_3y
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: see CUD pricing
        userMultiplied: false
    elements:
      - name: Resource-based CUDs
      - name: Spend-based CUDs
      - name: Auto-renew available
  - id: google-cloud-platform-enterprise-agreement
    name: Enterprise Agreement
    type: enterprise
    description: Negotiated enterprise contract with custom pricing, volume discounts, premium support,
      and dedicated account management. Sold by Google Cloud field sales.
    entries:
      - label: Negotiated contract
        description: Custom enterprise commercial terms
        name: enterprise_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://cloud.google.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom volume discounts
      - name: Premium / Enhanced / Standard support tiers
      - name: Dedicated account management
      - name: Marketplace private offers
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
