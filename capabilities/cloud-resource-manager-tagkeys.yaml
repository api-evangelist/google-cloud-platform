    resources:
    - name: v3-tagKeys
      path: /v3/tagKeys
      operations:
      - name: cloudresourcemanagertagkeyslist
        method: GET
        description: Google Cloud Platform List Tag Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: parent
          in: query
          type: string
          description: The resource name of the parent. Must be of the form organizations/{org_id}.
          required: true
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of tag keys to return.
        - name: pageToken
          in: query
          type: string
