      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v3/tagkeys
      name: v3-tagkeys
      description: REST surface for v3-tagKeys.
      operations:
      - method: GET
        name: cloudresourcemanagertagkeyslist
        description: Google Cloud Platform List Tag Keys
        call: cloud-resource-manager-tagkeys.cloudresourcemanagertagkeyslist
        with:
          parent: rest.parent
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
