  - TagKeys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_CLOUD_PLATFORM_API_KEY: GOOGLE_CLOUD_PLATFORM_API_KEY
