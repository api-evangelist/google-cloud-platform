naftiko: "1.0.0-alpha1"

info:
  label: "Google Cloud Platform Resource Hierarchy Management"
  description: "Workflow for managing the Google Cloud resource hierarchy including projects, folders, organizations, and tags. Used by cloud administrators and platform engineers."
  tags:
    - Google Cloud
    - Resource Management
    - Governance
    - Infrastructure
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GOOGLE_OAUTH_TOKEN: GOOGLE_OAUTH_TOKEN

capability:
  consumes:
    - import: cloud-resource-manager
      location: ./shared/cloud-resource-manager.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: gcp-resource-api
      description: "Unified REST API for GCP resource hierarchy management."
      resources:
        - path: /v1/projects
          name: projects
          description: "Project management"
          operations:
            - method: GET
              name: list-projects
              description: "List projects"
              call: "cloud-resource-manager.list-projects"
              with:
                parent: "rest.parent"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-project
              description: "Create a project"
              call: "cloud-resource-manager.create-project"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects/{name}
          name: project
          description: "Single project operations"
          operations:
            - method: GET
              name: get-project
              description: "Get project details"
              call: "cloud-resource-manager.get-project"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-project
              description: "Update a project"
              call: "cloud-resource-manager.update-project"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-project
              description: "Delete a project"
              call: "cloud-resource-manager.delete-project"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/folders
          name: folders
          description: "Folder management"
          operations:
            - method: GET
              name: list-folders
              description: "List folders"
              call: "cloud-resource-manager.list-folders"
              with:
                parent: "rest.parent"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-folder
              description: "Create a folder"
              call: "cloud-resource-manager.create-folder"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/organizations/{name}
          name: organization
          description: "Organization operations"
          operations:
            - method: GET
              name: get-organization
              description: "Get organization details"
              call: "cloud-resource-manager.get-organization"
              with:
                name: "rest.name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: gcp-resource-mcp
      transport: http
      description: "MCP server for AI-assisted GCP resource hierarchy management."
      tools:
        - name: list-projects
          description: "List Google Cloud projects under a parent"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-projects"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-project
          description: "Create a new Google Cloud project"
          hints:
            readOnly: false
            idempotent: false
          call: "cloud-resource-manager.create-project"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project
          description: "Get project details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-project"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-project
          description: "Update a project"
          hints:
            readOnly: false
            idempotent: true
          call: "cloud-resource-manager.update-project"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-project
          description: "Delete a Google Cloud project"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "cloud-resource-manager.delete-project"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-projects
          description: "Search for projects matching a query"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.search-projects"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-folders
          description: "List folders under a parent"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-folders"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-folder
          description: "Create a folder"
          hints:
            readOnly: false
            idempotent: false
          call: "cloud-resource-manager.create-folder"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-folder
          description: "Get folder details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-folder"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-folder
          description: "Delete a folder"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "cloud-resource-manager.delete-folder"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-organization
          description: "Get organization details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-organization"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-organizations
          description: "Search for organizations"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.search-organizations"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tag-keys
          description: "List tag keys for resource tagging"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-tag-keys"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-tag-key
          description: "Create a new tag key"
          hints:
            readOnly: false
            idempotent: false
          call: "cloud-resource-manager.create-tag-key"
          outputParameters:
            - type: object
              mapping: "$."
