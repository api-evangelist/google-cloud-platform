naftiko: "1.0.0-alpha1"

info:
  label: "Google Cloud Resource Manager API"
  description: "Programmatically manage Google Cloud projects, folders, organizations, and tags."
  tags:
    - Google Cloud
    - Resource Management
    - Projects
    - Organizations
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GOOGLE_OAUTH_TOKEN: GOOGLE_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: cloud-resource-manager
      baseUri: https://cloudresourcemanager.googleapis.com
      description: "Google Cloud Resource Manager API for managing projects, folders, and organizations."
      authentication:
        type: bearer
        token: "{{GOOGLE_OAUTH_TOKEN}}"
      resources:
        - name: projects
          path: /v3/projects
          description: "Project management operations."
          operations:
            - name: list-projects
              method: GET
              description: "Lists projects under a parent resource."
              inputParameters:
                - name: parent
                  in: query
                  type: string
                  required: true
                  description: "The parent resource."
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-project
              method: POST
              description: "Creates a new project."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  projectId: "{{tools.projectId}}"
                  displayName: "{{tools.displayName}}"
                  parent: "{{tools.parent}}"
            - name: get-project
              method: GET
              description: "Gets a project by name."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The project name (projects/{projectId})."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-project
              method: PATCH
              description: "Updates a project."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
            - name: delete-project
              method: DELETE
              description: "Marks a project for deletion."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The project name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-projects
              method: GET
              description: "Search for projects matching a query."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: folders
          path: /v3/folders
          description: "Folder management operations."
          operations:
            - name: list-folders
              method: GET
              description: "Lists folders under a parent resource."
              inputParameters:
                - name: parent
                  in: query
                  type: string
                  required: true
                  description: "The parent resource."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-folder
              method: POST
              description: "Creates a folder."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"
                  parent: "{{tools.parent}}"
            - name: get-folder
              method: GET
              description: "Gets a folder."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The folder name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-folder
              method: DELETE
              description: "Marks a folder for deletion."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The folder name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: organizations
          path: /v3/organizations
          description: "Organization operations."
          operations:
            - name: get-organization
              method: GET
              description: "Gets an organization."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The organization name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-organizations
              method: GET
              description: "Search for organizations."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search query."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tag-keys
          path: /v3/tagKeys
          description: "Tag key operations."
          operations:
            - name: list-tag-keys
              method: GET
              description: "Lists tag keys."
              inputParameters:
                - name: parent
                  in: query
                  type: string
                  required: true
                  description: "The parent resource."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tag-key
              method: POST
              description: "Creates a tag key."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  shortName: "{{tools.shortName}}"
                  parent: "{{tools.parent}}"

  exposes:
    - type: rest
      port: 8100
      namespace: crm-rest
      resources:
        - path: /v1/projects
          name: projects
          description: "Project management"
          operations:
            - method: GET
              name: list-projects
              description: "List projects"
              call: "cloud-resource-manager.list-projects"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: crm-mcp
      transport: http
      tools:
        - name: list-projects
          description: "List Google Cloud projects"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-projects"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-project
          description: "Create a new Google Cloud project"
          hints:
            readOnly: false
            idempotent: false
          call: "cloud-resource-manager.create-project"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-project
          description: "Get project details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-project"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-project
          description: "Delete a project"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "cloud-resource-manager.delete-project"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-projects
          description: "Search for projects"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.search-projects"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-folders
          description: "List folders under a parent"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-folders"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-folder
          description: "Create a folder"
          hints:
            readOnly: false
            idempotent: false
          call: "cloud-resource-manager.create-folder"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-folder
          description: "Get folder details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-folder"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-organization
          description: "Get organization details"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.get-organization"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-organizations
          description: "Search organizations"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.search-organizations"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tag-keys
          description: "List tag keys"
          hints:
            readOnly: true
            idempotent: true
          call: "cloud-resource-manager.list-tag-keys"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
