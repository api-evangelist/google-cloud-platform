specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google Cloud Platform
providerId: google-cloud-platform
publisherName: Google LLC
serviceCategory: Cloud Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud Platform
  - Multi-Product
  - Google Cloud
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Google Cloud Platform: a multi-product Pay-As-You-Go cloud with
  layered Sustained Use Discounts, Committed Use Discounts (1y/3y), and negotiated enterprise agreements.
  Cloud Billing supports a native FOCUS-formatted detailed export to BigQuery for canonical cost-and-usage
  visibility.'
sources:
  - https://cloud.google.com/billing/docs/how-to/export-data-bigquery
  - https://cloud.google.com/billing/docs/how-to/budgets
  - https://cloud.google.com/billing/docs/how-to/manage-budget
  - https://focus.finops.org/
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD/EUR/GBP/JPY
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Google Cloud Platform
  ServiceCategory: Cloud Platform
  ProviderName: Google Cloud
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: compute_instance_hours
    description: Provisioned VM and container compute time
    unit: instance-hour
    aggregation: sum
    dimensions:
      - service
      - machine_type
      - region
      - zone
      - project
      - sku
  - name: storage_gb_month
    description: Object, block, and database storage retained
    unit: GB-month
    aggregation: sum
    dimensions:
      - service
      - storage_class
      - region
      - project
  - name: network_egress
    description: Internet, inter-region, and inter-zone egress
    unit: GB
    aggregation: sum
    dimensions:
      - source_region
      - destination
      - tier
      - project
  - name: api_requests
    description: Per-API operation count (Cloud Storage class A/B, Pub/Sub messages, etc.)
    unit: request
    aggregation: sum
    dimensions:
      - service
      - operation
      - region
      - project
  - name: ai_inference
    description: Tokens/characters/seconds consumed by Vertex AI and Gemini API
    unit: varies
    aggregation: sum
    dimensions:
      - model
      - region
      - project
  - name: cud_consumption
    description: Slot/CPU/memory hours covered by 1y/3y commitments
    unit: varies
    aggregation: sum
    dimensions:
      - commitment_id
      - region
      - resource
  - name: sud_credits
    description: Sustained Use Discount credits applied
    unit: USD
    aggregation: sum
    dimensions:
      - service
      - region
  - name: support_charge
    description: Standard / Enhanced / Premium Cloud Support fees
    unit: USD-month
    aggregation: sum
    dimensions:
      - tier
apis:
  - name: Cloud Resource Manager API
    baseURL: https://cloudresourcemanager.googleapis.com
    serviceName: Cloud Resource Manager API
    serviceCategory: Management
  - name: Cloud Billing API
    baseURL: https://cloudbilling.googleapis.com
    serviceName: Cloud Billing API
    serviceCategory: Billing
  - name: Cloud Service Usage API
    baseURL: https://serviceusage.googleapis.com
    serviceName: Service Usage API
    serviceCategory: Management
  - name: Cloud Asset API
    baseURL: https://cloudasset.googleapis.com
    serviceName: Cloud Asset API
    serviceCategory: Management
principles:
  - name: Visibility
    description: Enable Cloud Billing detailed (FOCUS-formatted) export to BigQuery; use the Reports tab
      and Cost Table report for daily slice-and-dice; consume Recommender suggestions surfaced in Cost
      Insights.
  - name: Allocation
    description: Use folders + projects as the primary allocation hierarchy; tag resources with labels
      (team, env, app, costCenter); pivot the FOCUS export by labels for chargeback/showback.
  - name: Optimization
    description: Apply CUDs (1y/3y) for steady-state workloads; let SUDs accrue automatically; use the
      Active Assist Recommender for rightsizing, idle-resource cleanup, and CUD purchase recommendations;
      adopt Spot/Preemptible VMs for fault-tolerant batch.
  - name: Accountability
    description: Assign budget owners per project/folder; configure Cloud Billing budget alerts at 50/80/100/120%
      with Pub/Sub triggers for automation; review monthly variance against forecast in the FinOps practice
      forum.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
