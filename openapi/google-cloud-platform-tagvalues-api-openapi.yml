openapi: 3.1.0
info:
  title: Google Cloud Platform Google Cloud Resource Manager Folders TagValues API
  description: Programmatically manage Google Cloud projects, folders, and organizations. The Cloud Resource Manager API enables you to create, read, update, and delete projects, folders, and organizations in the Google Cloud resource hierarchy. It provides the foundation for organizing and governing Google Cloud resources through a hierarchical structure of organizations, folders, and projects.
  version: v3
  termsOfService: https://cloud.google.com/terms
  contact:
    name: Google Cloud Platform
    url: https://cloud.google.com/resource-manager/
  license:
    name: Creative Commons Attribution 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  x-logo:
    url: https://cloud.google.com/_static/images/cloud/icons/favicons/onecloud/super_cloud.png
servers:
- url: https://cloudresourcemanager.googleapis.com
  description: Google Cloud Resource Manager API production endpoint
security:
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform.read-only
tags:
- name: TagValues
  description: Manage tag values associated with tag keys. Tag values are the specific labels that can be bound to resources through tag bindings.
paths:
  /v3/tagValues:
    get:
      operationId: cloudresourcemanager.tagValues.list
      summary: Google Cloud Platform List Tag Values
      description: Lists all tag values for a specified tag key. The caller must have the resourcemanager.tagValues.list permission on the parent tag key.
      tags:
      - TagValues
      parameters:
      - name: parent
        in: query
        description: The resource name of the tag key whose values are to be listed. Must be of the form tagKeys/{tag_key_id}.
        required: true
        schema:
          type: string
        example: example_value
      - name: pageSize
        in: query
        description: Maximum number of tag values to return.
        schema:
          type: integer
          format: int32
        example: 10
      - name: pageToken
        in: query
        description: Pagination token from a previous list call.
        schema:
          type: string
        example: example_value
      responses:
        '200':
          description: Successful response containing a list of tag values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTagValuesResponse'
              examples:
                CloudresourcemanagerTagvaluesList200Example:
                  summary: Default cloudresourcemanager.tagValues.list 200 response
                  x-microcks-default: true
                  value:
                    tagValues:
                    - name: Example Title
                      parent: example_value
                      shortName: example_value
                      namespacedName: example_value
                      description: A sample description.
                      createTime: '2026-01-15T10:30:00Z'
                      updateTime: '2026-01-15T10:30:00Z'
                      etag: example_value
                    nextPageToken: example_value
        '401':
          description: Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerTagvaluesList401Example:
                  summary: Default cloudresourcemanager.tagValues.list 401 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '403':
          description: The caller does not have required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerTagvaluesList403Example:
                  summary: Default cloudresourcemanager.tagValues.list 403 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: cloudresourcemanager.tagValues.create
      summary: Google Cloud Platform Create a Tag Value
      description: Creates a tag value as a child of the specified tag key. The caller must have the resourcemanager.tagValues.create permission on the parent tag key.
      tags:
      - TagValues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagValue'
            examples:
              CloudresourcemanagerTagvaluesCreateRequestExample:
                summary: Default cloudresourcemanager.tagValues.create request
                x-microcks-default: true
                value:
                  name: Example Title
                  parent: example_value
                  shortName: example_value
                  namespacedName: example_value
                  description: A sample description.
                  createTime: '2026-01-15T10:30:00Z'
                  updateTime: '2026-01-15T10:30:00Z'
                  etag: example_value
      responses:
        '200':
          description: Operation started successfully. Returns a long-running operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
              examples:
                CloudresourcemanagerTagvaluesCreate200Example:
                  summary: Default cloudresourcemanager.tagValues.create 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    metadata: example_value
                    done: true
                    error:
                      code: 10
                      message: example_value
                      details:
                      - {}
                    response: example_value
        '400':
          description: Invalid tag value data provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerTagvaluesCreate400Example:
                  summary: Default cloudresourcemanager.tagValues.create 400 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '401':
          description: Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerTagvaluesCreate401Example:
                  summary: Default cloudresourcemanager.tagValues.create 401 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '403':
          description: The caller does not have required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerTagvaluesCreate403Example:
                  summary: Default cloudresourcemanager.tagValues.create 403 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:
    Operation:
      type: object
      description: Represents a long-running operation that is the result of a network API call. Many Resource Manager operations are asynchronous and return an Operation that can be polled for status.
      properties:
        name:
          type: string
          description: The server-assigned name, which is only unique within the same service. Used to poll for the operation status.
          example: Example Title
        metadata:
          type: object
          description: Service-specific metadata associated with the operation.
          additionalProperties: true
          example: example_value
        done:
          type: boolean
          description: If true, the operation is complete and either error or response is available.
          example: true
        error:
          $ref: '#/components/schemas/Status'
        response:
          type: object
          description: The normal response of the operation. Contains the result on success.
          additionalProperties: true
          example: example_value
    ListTagValuesResponse:
      type: object
      description: Response message for listing tag values.
      properties:
        tagValues:
          type: array
          description: The list of tag values.
          items:
            $ref: '#/components/schemas/TagValue'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    Status:
      type: object
      description: The Status type defines a logical error model that is suitable for REST APIs. It is used to communicate error details from the API.
      properties:
        code:
          type: integer
          format: int32
          description: The status code, which should be an enum value of google.rpc.Code.
          example: 10
        message:
          type: string
          description: A developer-facing error message in English.
          example: example_value
        details:
          type: array
          description: A list of messages that carry the error details.
          items:
            type: object
            additionalProperties: true
          example: []
    TagValue:
      type: object
      description: A tag value, which is a child of a tag key. Tag values are the specific labels that can be attached to resources through tag bindings.
      properties:
        name:
          type: string
          description: The resource name of the tag value in the form tagValues/{tag_value_id}. Output only.
          readOnly: true
          example: Example Title
        parent:
          type: string
          description: The resource name of the parent tag key.
          example: example_value
        shortName:
          type: string
          description: The user-friendly short name for the tag value. Unique for a given tag key. Maximum length of 256 characters.
          maxLength: 256
          example: example_value
        namespacedName:
          type: string
          description: The namespaced name of the tag value in the form {parentNamespace}/{shortName}. Output only.
          readOnly: true
          example: example_value
        description:
          type: string
          description: User-assigned description of the tag value. Maximum length of 256 characters.
          maxLength: 256
          example: A sample description.
        createTime:
          type: string
          format: date-time
          description: Timestamp when the tag value was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp when the tag value was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: Entity tag for optimistic concurrency control.
          readOnly: true
          example: example_value
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication using Google Cloud service accounts or user credentials. Supports both service-to-service and end-user authentication flows.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/cloud-platform: Full access to view and manage Google Cloud resources.
            https://www.googleapis.com/auth/cloud-platform.read-only: Read-only access to view Google Cloud resources.
    apiKey:
      type: apiKey
      name: key
      in: query
      description: API key for identifying the calling project.
