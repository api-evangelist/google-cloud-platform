openapi: 3.1.0
info:
  title: Google Cloud Platform Google Cloud Resource Manager Folders Projects API
  description: Programmatically manage Google Cloud projects, folders, and organizations. The Cloud Resource Manager API enables you to create, read, update, and delete projects, folders, and organizations in the Google Cloud resource hierarchy. It provides the foundation for organizing and governing Google Cloud resources through a hierarchical structure of organizations, folders, and projects.
  version: v3
  termsOfService: https://cloud.google.com/terms
  contact:
    name: Google Cloud Platform
    url: https://cloud.google.com/resource-manager/
  license:
    name: Creative Commons Attribution 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  x-logo:
    url: https://cloud.google.com/_static/images/cloud/icons/favicons/onecloud/super_cloud.png
servers:
- url: https://cloudresourcemanager.googleapis.com
  description: Google Cloud Resource Manager API production endpoint
security:
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform.read-only
tags:
- name: Projects
  description: Manage Google Cloud projects. A project is the base-level organizing entity in Google Cloud and is required to use most Google Cloud services. Projects contain resources and are associated with billing accounts.
paths:
  /v3/projects:
    get:
      operationId: cloudresourcemanager.projects.list
      summary: Google Cloud Platform List Projects
      description: Lists projects that are direct children of the specified parent resource. Projects are listed in alphabetical order by display name. The caller must have the resourcemanager.projects.list permission on the parent resource.
      tags:
      - Projects
      parameters:
      - name: parent
        in: query
        description: The name of the parent resource whose projects are to be listed. Must be of the form folders/{folder_id} or organizations/{org_id}.
        required: true
        schema:
          type: string
          examples:
          - folders/123456789
          - organizations/987654321
        example: example_value
      - name: pageSize
        in: query
        description: Maximum number of projects to return in the response. The server can return fewer results. If unspecified, the server picks an appropriate default value.
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000
        example: 10
      - name: pageToken
        in: query
        description: A pagination token returned from a previous call to ListProjects that indicates where this listing should continue from.
        schema:
          type: string
        example: example_value
      - name: showDeleted
        in: query
        description: Indicate that projects in the DELETE_REQUESTED state should also be returned.
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Successful response containing a list of projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsResponse'
              examples:
                CloudresourcemanagerProjectsList200Example:
                  summary: Default cloudresourcemanager.projects.list 200 response
                  x-microcks-default: true
                  value:
                    projects:
                    - name: Example Title
                      parent: example_value
                      projectId: '500123'
                      state: STATE_UNSPECIFIED
                      displayName: example_value
                      createTime: '2026-01-15T10:30:00Z'
                      updateTime: '2026-01-15T10:30:00Z'
                      deleteTime: '2026-01-15T10:30:00Z'
                      etag: example_value
                      labels: example_value
                    nextPageToken: example_value
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerProjectsList400Example:
                  summary: Default cloudresourcemanager.projects.list 400 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '401':
          description: Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerProjectsList401Example:
                  summary: Default cloudresourcemanager.projects.list 401 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '403':
          description: The caller does not have required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerProjectsList403Example:
                  summary: Default cloudresourcemanager.projects.list 403 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: cloudresourcemanager.projects.create
      summary: Google Cloud Platform Create a Project
      description: Creates a new project resource under the specified parent. The parent must be an organization or folder. The caller must have the resourcemanager.projects.create permission on the parent. This method returns a long-running Operation which can be used to track creation.
      tags:
      - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
            examples:
              CloudresourcemanagerProjectsCreateRequestExample:
                summary: Default cloudresourcemanager.projects.create request
                x-microcks-default: true
                value:
                  name: Example Title
                  parent: example_value
                  projectId: '500123'
                  state: STATE_UNSPECIFIED
                  displayName: example_value
                  createTime: '2026-01-15T10:30:00Z'
                  updateTime: '2026-01-15T10:30:00Z'
                  deleteTime: '2026-01-15T10:30:00Z'
