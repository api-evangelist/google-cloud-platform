          type: string
        example: example_value
      - name: pageSize
        in: query
        description: Maximum number of projects to return.
        schema:
          type: integer
          format: int32
        example: 10
      - name: pageToken
        in: query
        description: Pagination token from a previous search call.
        schema:
          type: string
