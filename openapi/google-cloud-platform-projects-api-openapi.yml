  /v3/projects:search:
    get:
      operationId: cloudresourcemanager.projects.search
      summary: Google Cloud Platform Search Projects
      description: Search for projects that the caller has the resourcemanager.projects.get permission on. Projects can be filtered by parent, display name, project ID, and state.
      tags:
      - Projects
      parameters:
      - name: query
        in: query
        description: 'A query string for searching projects. The query supports filtering by displayName, parent.type, parent.id, projectId, state, and labels. Example: parent.type:folder parent.id:123.'
