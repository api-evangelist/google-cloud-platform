      operationId: cloudresourcemanager.projects.delete
      summary: Google Cloud Platform Delete a Project
      description: Marks the project identified by the specified name to be deleted. This method sets the project lifecycle state to DELETE_REQUESTED. The project is not immediately deleted but enters a 30-day grace period during which it can be restored using undelete. After 30 days, the project and all its resources are permanently deleted.
