        OAuth 2.0 authentication using Google Cloud service accounts or user
        credentials. Supports both service-to-service and end-user
        authentication flows.
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/cloud-platform: >-
              Full access to view and manage Google Cloud resources.
            https://www.googleapis.com/auth/cloud-platform.read-only: >-
              Read-only access to view Google Cloud resources.
    apiKey:
      type: apiKey
      name: key
      in: query
      description: API key for identifying the calling project.
  schemas:
    Project:
      type: object
      description: >-
        A project is a high-level Google Cloud entity. It is a container for
        ACLs, APIs, App Engine Apps, VMs, and other Google Cloud Platform
        resources. Projects are the base-level organizing entity and are
        required to use service-level resources.
      properties:
        name:
          type: string
          description: >-
            The unique resource name of the project in the form
            projects/{project_number}. Output only.
          readOnly: true
          examples:
          - projects/123456789
        parent:
          type: string
          description: >-
            The resource name of the parent in the form folders/{folder_id} or
            organizations/{organization_id}. Required when creating a project.
          examples:
          - folders/123456789
          - organizations/987654321
        projectId:
          type: string
          description: >-
            The unique, user-assigned identifier of the project. It must be 6
            to 30 lowercase ASCII letters, digits, or hyphens. It must start
            with a letter and cannot end with a hyphen. Project IDs are
            immutable and cannot be reused once assigned.
          pattern: '^[a-z][a-z0-9-]{4,28}[a-z0-9]$'
          examples:
          - my-gcp-project
          - production-app-2024
        state:
          type: string
          description: The project lifecycle state. Output only.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - ACTIVE
          - DELETE_REQUESTED
          examples:
          - ACTIVE
        displayName:
          type: string
          description: >-
            A user-assigned display name for the project. This field is
            optional and has a maximum length of 30 characters. Display names
            are used for identification purposes and do not need to be unique.
          maxLength: 30
          examples:
          - My GCP Project
        createTime:
          type: string
          format: date-time
          description: >-
            Timestamp of when the project was created. Output only. Uses
            RFC 3339 format.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: >-
            Timestamp of when the project was last modified. Output only. Uses
            RFC 3339 format.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        deleteTime:
          type: string
          format: date-time
          description: >-
            Timestamp of when the delete request was sent. Only present when
            the project is in DELETE_REQUESTED state. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: >-
            A checksum computed by the server based on the current value of
            the project resource. Used for optimistic concurrency control.
          readOnly: true
          example: example_value
        labels:
          type: object
          description: >-
            User-defined labels associated with the project. Label keys must
            be between 1 and 63 characters, and label values must be between
            0 and 63 characters. Both keys and values can contain lowercase
            letters, numeric characters, underscores, and dashes. A maximum
            of 256 labels can be associated with a project.
          additionalProperties:
            type: string
          examples:
          - env: production
            team: backend
    Folder:
      type: object
      description: >-
        A folder in the Google Cloud resource hierarchy. Folders can contain
        projects and other folders, allowing users to group resources and
        apply policies hierarchically. Folders can be up to 10 levels deep.
      properties:
        name:
          type: string
          description: >-
            The resource name of the folder in the form folders/{folder_id}.
            Output only.
          readOnly: true
          examples:
          - folders/123456789
        parent:
          type: string
          description: >-
            The resource name of the folder's parent. Can be an organization
            or another folder in the form organizations/{org_id} or
            folders/{folder_id}.
          examples:
          - organizations/987654321
          - folders/111222333
        displayName:
          type: string
          description: >-
            The folder's display name. A folder's display name must be
            distinct from all other folders that share its parent. The
            display name must start and end with a letter or digit, may
            contain letters, digits, spaces, hyphens and underscores, and
            can be no longer than 30 characters.
          maxLength: 30
          examples:
          - Engineering
        state:
          type: string
          description: The lifecycle state of the folder. Output only.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - ACTIVE
          - DELETE_REQUESTED
          example: STATE_UNSPECIFIED
        createTime:
          type: string
          format: date-time
          description: Timestamp of when the folder was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp of when the folder was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        deleteTime:
          type: string
          format: date-time
          description: >-
            Timestamp of when the delete request was sent. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: >-
            A checksum computed by the server based on the current value of
            the folder resource.
          readOnly: true
          example: example_value
    Organization:
      type: object
      description: >-
        The root node in the resource hierarchy to which a particular entity's
        resources belong. An organization is tied to a Google Workspace or
        Cloud Identity account. Organizations cannot be created or deleted
        through the API; they are automatically provisioned when a Google
        Workspace or Cloud Identity account is created.
      properties:
        name:
          type: string
          description: >-
            The resource name of the organization in the form
            organizations/{organization_id}. Output only.
          readOnly: true
          examples:
          - organizations/987654321
        displayName:
          type: string
          description: >-
            A human-readable string that refers to the organization in the
            Google Cloud Console. This field is output only and derived from
            the associated Google Workspace or Cloud Identity account.
          readOnly: true
          examples:
          - Example Corp
        directoryCustomerId:
          type: string
          description: >-
            The unique identifier for the Google Workspace or Cloud Identity
            account associated with this organization. Output only.
          readOnly: true
          example: '500123'
        state:
          type: string
          description: The organization lifecycle state. Output only.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - ACTIVE
          - DELETE_REQUESTED
          example: STATE_UNSPECIFIED
        createTime:
          type: string
          format: date-time
          description: Timestamp when the organization was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp when the organization was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        deleteTime:
          type: string
          format: date-time
          description: >-
            Timestamp of when the delete request was sent. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: >-
            A checksum computed by the server based on the current value of
            the organization resource.
          readOnly: true
          example: example_value
    TagKey:
      type: object
      description: >-
        A tag key, used to group tag values. Tag keys define namespaces for
        tag values that can be attached to resources for organization and
        policy purposes.
      properties:
        name:
          type: string
          description: >-
            The resource name of the tag key in the form tagKeys/{tag_key_id}.
            Output only.
          readOnly: true
          example: Example Title
        parent:
          type: string
          description: >-
            The resource name of the parent. Must be of the form
            organizations/{org_id}.
          example: example_value
        shortName:
          type: string
          description: >-
            The user-friendly short name for the tag key. The short name must
            be unique within the same parent and have a maximum length of 256
            characters.
          maxLength: 256
          example: example_value
        namespacedName:
          type: string
          description: >-
            The namespaced name of the tag key in the form
            {parentId}/{shortName}. Output only.
          readOnly: true
          example: example_value
        description:
          type: string
          description: >-
            User-assigned description of the tag key. Maximum length of 256
            characters.
          maxLength: 256
          example: A sample description.
        createTime:
          type: string
          format: date-time
          description: Timestamp when the tag key was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp when the tag key was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: Entity tag for optimistic concurrency control.
          readOnly: true
          example: example_value
    TagValue:
      type: object
      description: >-
        A tag value, which is a child of a tag key. Tag values are the
        specific labels that can be attached to resources through tag bindings.
      properties:
        name:
          type: string
          description: >-
            The resource name of the tag value in the form
            tagValues/{tag_value_id}. Output only.
          readOnly: true
          example: Example Title
        parent:
          type: string
          description: The resource name of the parent tag key.
          example: example_value
        shortName:
          type: string
          description: >-
            The user-friendly short name for the tag value. Unique for a given
            tag key. Maximum length of 256 characters.
          maxLength: 256
          example: example_value
        namespacedName:
          type: string
          description: >-
            The namespaced name of the tag value in the form
            {parentNamespace}/{shortName}. Output only.
          readOnly: true
          example: example_value
        description:
          type: string
          description: >-
            User-assigned description of the tag value. Maximum length of 256
            characters.
          maxLength: 256
          example: A sample description.
        createTime:
          type: string
          format: date-time
          description: Timestamp when the tag value was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp when the tag value was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: Entity tag for optimistic concurrency control.
          readOnly: true
          example: example_value
    TagBinding:
      type: object
      description: >-
        A tag binding associates a tag value with a Google Cloud resource.
        Tag bindings represent the link between organization taxonomy (tag
        keys and values) and actual cloud resources.
      properties:
        name:
          type: string
          description: >-
            The resource name of the tag binding in the form
            tagBindings/{tag_binding_id}. Output only.
          readOnly: true
          example: Example Title
        parent:
          type: string
          description: >-
            The full resource name of the resource the tag value is bound to.
            Example: //cloudresourcemanager.googleapis.com/projects/123.
          example: example_value
        tagValue:
          type: string
          description: >-
            The resource name of the tag value in the form
            tagValues/{tag_value_id}.
          example: example_value
        tagValueNamespacedName:
          type: string
          description: >-
            The namespaced name of the tag value in the form
            {parentNamespace}/{tagKeyShortName}/{tagValueShortName}.
            Output only.
          readOnly: true
          example: example_value
    Policy:
      type: object
      description: >-
        An Identity and Access Management (IAM) policy which specifies access
        controls for Google Cloud resources. A Policy is a collection of
        bindings that associate members with roles.
      properties:
        version:
          type: integer
          format: int32
          description: >-
            Specifies the format of the policy. Valid values are 0, 1, and 3.
            Version 3 supports conditional role bindings.
          example: 10
        bindings:
          type: array
          description: >-
            Associates a list of members to a role, optionally with a
            condition.
          items:
            $ref: '#/components/schemas/Binding'
          example: []
        etag:
          type: string
          format: byte
          description: >-
            etag is used for optimistic concurrency control to help prevent
            simultaneous updates of a policy from overwriting each other.
          example: example_value
    Binding:
      type: object
      description: Associates members with a role.
      properties:
        role:
          type: string
          description: >-
            The role that is assigned to the list of members. Example:
            roles/resourcemanager.projectViewer.
          examples:
          - roles/resourcemanager.projectViewer
        members:
          type: array
          description: >-
            The identities requesting access. Supports user, serviceAccount,
            group, and domain members.
          items:
            type: string
          examples:
          - - user:alice@example.com
            - serviceAccount:my-sa@project.iam.gserviceaccount.com
            - group:admins@example.com
            - domain:example.com
        condition:
          $ref: '#/components/schemas/Expr'
    Expr:
      type: object
      description: >-
        Represents a textual expression in the Common Expression Language
        (CEL) syntax. Used for conditional access policies.
      properties:
        expression:
          type: string
          description: >-
            The CEL expression string. Example:
            request.time < timestamp("2024-01-01T00:00:00Z").
          example: example_value
        title:
          type: string
          description: An optional title for the expression.
          example: Example Title
        description:
          type: string
          description: An optional description of the expression.
          example: A sample description.
        location:
          type: string
          description: >-
            An optional string indicating the location of the expression for
            error reporting.
          example: example_value
    Operation:
      type: object
      description: >-
        Represents a long-running operation that is the result of a network
        API call. Many Resource Manager operations are asynchronous and return
        an Operation that can be polled for status.
      properties:
        name:
          type: string
          description: >-
            The server-assigned name, which is only unique within the same
            service. Used to poll for the operation status.
          example: Example Title
        metadata:
          type: object
          description: >-
            Service-specific metadata associated with the operation.
          additionalProperties: true
          example: example_value
        done:
          type: boolean
          description: >-
            If true, the operation is complete and either error or response
            is available.
          example: true
        error:
          $ref: '#/components/schemas/Status'
        response:
          type: object
          description: >-
            The normal response of the operation. Contains the result on
            success.
          additionalProperties: true
          example: example_value
    Status:
      type: object
      description: >-
        The Status type defines a logical error model that is suitable for
        REST APIs. It is used to communicate error details from the API.
      properties:
        code:
          type: integer
          format: int32
          description: The status code, which should be an enum value of google.rpc.Code.
          example: 10
        message:
          type: string
          description: >-
            A developer-facing error message in English.
          example: example_value
        details:
          type: array
          description: >-
            A list of messages that carry the error details.
          items:
            type: object
            additionalProperties: true
          example: []
    ListProjectsResponse:
      type: object
      description: Response message for listing projects.
      properties:
        projects:
          type: array
          description: The list of projects under the specified parent.
          items:
            $ref: '#/components/schemas/Project'
          example: []
        nextPageToken:
          type: string
          description: >-
            Pagination token to retrieve the next page of results. Empty if
            there are no more results.
          example: example_value
    SearchProjectsResponse:
      type: object
      description: Response message for searching projects.
      properties:
        projects:
          type: array
          description: The list of projects matching the search criteria.
          items:
            $ref: '#/components/schemas/Project'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    ListFoldersResponse:
      type: object
      description: Response message for listing folders.
      properties:
        folders:
          type: array
          description: The list of folders under the specified parent.
          items:
            $ref: '#/components/schemas/Folder'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    SearchFoldersResponse:
      type: object
      description: Response message for searching folders.
      properties:
        folders:
          type: array
          description: The list of folders matching the search criteria.
          items:
            $ref: '#/components/schemas/Folder'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    SearchOrganizationsResponse:
      type: object
      description: Response message for searching organizations.
      properties:
        organizations:
          type: array
          description: The list of organizations matching the search criteria.
          items:
            $ref: '#/components/schemas/Organization'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    ListTagKeysResponse:
      type: object
      description: Response message for listing tag keys.
      properties:
        tagKeys:
          type: array
          description: The list of tag keys.
          items:
            $ref: '#/components/schemas/TagKey'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    ListTagValuesResponse:
      type: object
      description: Response message for listing tag values.
      properties:
        tagValues:
          type: array
          description: The list of tag values.
          items:
            $ref: '#/components/schemas/TagValue'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    ListTagBindingsResponse:
      type: object
      description: Response message for listing tag bindings.
      properties:
        tagBindings:
          type: array
          description: The list of tag bindings.
          items:
            $ref: '#/components/schemas/TagBinding'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    UndeleteProjectRequest:
      type: object
      description: Request message for undeleting a project.
      properties: {}
    UndeleteFolderRequest:
      type: object
      description: Request message for undeleting a folder.
      properties: {}
    MoveFolderRequest:
      type: object
      description: Request message for moving a folder.
      properties:
        destinationParent:
          type: string
          description: >-
            The resource name of the folder or organization which should be
            the new parent of the folder.
          examples:
          - folders/654321
          - organizations/987654321
      required:
      - destinationParent
    GetIamPolicyRequest:
      type: object
      description: Request message for GetIamPolicy method.
      properties:
        options:
          type: object
          description: Optional options for the request.
          properties:
            requestedPolicyVersion:
              type: integer
              format: int32
              description: >-
                The maximum policy version that will be used to format the
                policy. Valid values are 0, 1, and 3.
          example: example_value
    SetIamPolicyRequest:
      type: object
      description: Request message for SetIamPolicy method.
      properties:
        policy:
          $ref: '#/components/schemas/Policy'
        updateMask:
          type: string
          description: >-
            A FieldMask specifying which fields of the policy to modify. Only
            the fields in the mask will be modified.
          example: example_value
      required:
      - policy
