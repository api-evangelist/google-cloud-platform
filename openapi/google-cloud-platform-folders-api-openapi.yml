  /v3/folders/{folderId}:move:
    post:
      operationId: cloudresourcemanager.folders.move
      summary: Google Cloud Platform Move a Folder
      description: Moves a folder under a new resource parent. The folder can be moved to another folder or to the organization root. The caller must have the resourcemanager.folders.move permission on both the source folder and the destination parent.
      tags:
      - Folders
      parameters:
      - name: folderId
        in: path
        description: The resource name of the folder to move.
        required: true
        schema:
          type: string
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveFolderRequest'
            examples:
              CloudresourcemanagerFoldersMoveRequestExample:
                summary: Default cloudresourcemanager.folders.move request
                x-microcks-default: true
                value:
                  destinationParent: example_value
