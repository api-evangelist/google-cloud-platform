components:
  schemas:
    ListFoldersResponse:
      type: object
      description: Response message for listing folders.
      properties:
        folders:
          type: array
          description: The list of folders under the specified parent.
          items:
            $ref: '#/components/schemas/Folder'
          example: []
        nextPageToken:
          type: string
          description: Pagination token for the next page of results.
          example: example_value
    Folder:
      type: object
      description: A folder in the Google Cloud resource hierarchy. Folders can contain projects and other folders, allowing users to group resources and apply policies hierarchically. Folders can be up to 10 levels deep.
      properties:
        name:
          type: string
          description: The resource name of the folder in the form folders/{folder_id}. Output only.
          readOnly: true
          examples:
          - folders/123456789
        parent:
          type: string
          description: The resource name of the folder's parent. Can be an organization or another folder in the form organizations/{org_id} or folders/{folder_id}.
          examples:
          - organizations/987654321
          - folders/111222333
        displayName:
          type: string
          description: The folder's display name. A folder's display name must be distinct from all other folders that share its parent. The display name must start and end with a letter or digit, may contain letters, digits, spaces, hyphens and underscores, and can be no longer than 30 characters.
          maxLength: 30
          examples:
          - Engineering
        state:
          type: string
          description: The lifecycle state of the folder. Output only.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - ACTIVE
          - DELETE_REQUESTED
          example: STATE_UNSPECIFIED
        createTime:
          type: string
          format: date-time
          description: Timestamp of when the folder was created. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        updateTime:
          type: string
          format: date-time
          description: Timestamp of when the folder was last modified. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        deleteTime:
          type: string
          format: date-time
          description: Timestamp of when the delete request was sent. Output only.
          readOnly: true
          example: '2026-01-15T10:30:00Z'
        etag:
          type: string
          description: A checksum computed by the server based on the current value of the folder resource.
          readOnly: true
          example: example_value
    MoveFolderRequest:
      type: object
      description: Request message for moving a folder.
      properties:
        destinationParent:
          type: string
          description: The resource name of the folder or organization which should be the new parent of the folder.
          examples:
          - folders/654321
          - organizations/987654321
      required:
      - destinationParent
    UndeleteFolderRequest:
      type: object
      description: Request message for undeleting a folder.
      properties: {}
    Operation:
      type: object
      description: Represents a long-running operation that is the result of a network API call. Many Resource Manager operations are asynchronous and return an Operation that can be polled for status.
      properties:
        name:
          type: string
