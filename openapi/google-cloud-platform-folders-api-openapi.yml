    delete:
      operationId: cloudresourcemanager.folders.delete
      summary: Google Cloud Platform Delete a Folder
      description: Requests deletion of a folder. The folder is moved into the DELETE_REQUESTED state and enters a 30-day grace period. During this period, the folder can be restored. After the grace period, the folder is permanently deleted. The folder must be empty before it can be deleted. The caller must have the resourcemanager.folders.delete permission on the folder.
