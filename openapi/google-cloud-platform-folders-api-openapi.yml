      - Folders
      parameters:
      - name: folderId
        in: path
        description: The resource name of the folder to update.
        required: true
        schema:
          type: string
        example: '500123'
      - name: updateMask
        in: query
        description: Fields to be updated. Only the display_name field can be updated.
        schema:
          type: string
        example: example_value
      requestBody:
