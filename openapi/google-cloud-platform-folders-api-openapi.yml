openapi: 3.1.0
info:
  title: Google Cloud Platform Google Cloud Resource Manager Folders API
  description: Programmatically manage Google Cloud projects, folders, and organizations. The Cloud Resource Manager API enables you to create, read, update, and delete projects, folders, and organizations in the Google Cloud resource hierarchy. It provides the foundation for organizing and governing Google Cloud resources through a hierarchical structure of organizations, folders, and projects.
  version: v3
  termsOfService: https://cloud.google.com/terms
  contact:
    name: Google Cloud Platform
    url: https://cloud.google.com/resource-manager/
  license:
    name: Creative Commons Attribution 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  x-logo:
    url: https://cloud.google.com/_static/images/cloud/icons/favicons/onecloud/super_cloud.png
servers:
- url: https://cloudresourcemanager.googleapis.com
  description: Google Cloud Resource Manager API production endpoint
security:
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform
- oauth2:
  - https://www.googleapis.com/auth/cloud-platform.read-only
tags:
- name: Folders
  description: Manage Google Cloud folders. Folders provide an additional grouping mechanism and isolation boundary between projects. They can be used to model organizational structure, departments, teams, or environments.
paths:
  /v3/folders:
    get:
      operationId: cloudresourcemanager.folders.list
      summary: Google Cloud Platform List Folders
      description: Lists the folders that are direct descendants of the specified parent resource. The caller must have the resourcemanager.folders.list permission on the parent. Folders are listed in alphabetical order by display name.
      tags:
      - Folders
      parameters:
      - name: parent
        in: query
        description: The name of the parent resource whose folders are to be listed. Must be of the form folders/{folder_id} or organizations/{org_id}.
        required: true
        schema:
          type: string
        example: example_value
      - name: pageSize
        in: query
        description: Maximum number of folders to return.
        schema:
          type: integer
          format: int32
        example: 10
      - name: pageToken
        in: query
        description: Pagination token from a previous list call.
        schema:
          type: string
        example: example_value
      - name: showDeleted
        in: query
        description: Indicate that folders in the DELETE_REQUESTED state should also be returned.
        schema:
          type: boolean
          default: false
        example: true
      responses:
        '200':
          description: Successful response containing a list of folders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFoldersResponse'
              examples:
                CloudresourcemanagerFoldersList200Example:
                  summary: Default cloudresourcemanager.folders.list 200 response
                  x-microcks-default: true
                  value:
                    folders:
                    - name: Example Title
                      parent: example_value
                      displayName: example_value
                      state: STATE_UNSPECIFIED
                      createTime: '2026-01-15T10:30:00Z'
                      updateTime: '2026-01-15T10:30:00Z'
                      deleteTime: '2026-01-15T10:30:00Z'
                      etag: example_value
                    nextPageToken: example_value
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerFoldersList400Example:
                  summary: Default cloudresourcemanager.folders.list 400 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '401':
          description: Authentication credentials are missing or invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerFoldersList401Example:
                  summary: Default cloudresourcemanager.folders.list 401 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
        '403':
          description: The caller does not have required permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
                CloudresourcemanagerFoldersList403Example:
                  summary: Default cloudresourcemanager.folders.list 403 response
                  x-microcks-default: true
                  value:
                    code: 10
                    message: example_value
                    details:
                    - {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: cloudresourcemanager.folders.create
      summary: Google Cloud Platform Create a Folder
      description: Creates a folder in the resource hierarchy under the specified parent. The parent can be an organization or another folder. The caller must have the resourcemanager.folders.create permission on the parent.
      tags:
      - Folders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Folder'
            examples:
              CloudresourcemanagerFoldersCreateRequestExample:
                summary: Default cloudresourcemanager.folders.create request
                x-microcks-default: true
                value:
                  name: Example Title
                  parent: example_value
                  displayName: example_value
                  state: STATE_UNSPECIFIED
                  createTime: '2026-01-15T10:30:00Z'
                  updateTime: '2026-01-15T10:30:00Z'
                  deleteTime: '2026-01-15T10:30:00Z'
                  etag: example_value
      responses:
        '200':
          description: Operation started successfully. Returns a long-running operation that can be polled for completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
              examples:
                CloudresourcemanagerFoldersCreate200Example:
                  summary: Default cloudresourcemanager.folders.create 200 response
                  x-microcks-default: true
                  value:
                    name: Example Title
                    metadata: example_value
                    done: true
                    error:
                      code: 10
                      message: example_value
                      details:
                      - {}
                    response: example_value
        '400':
          description: Invalid folder data provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
              examples:
