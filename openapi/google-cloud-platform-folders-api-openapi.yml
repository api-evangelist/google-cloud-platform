          application/json:
            schema:
              $ref: '#/components/schemas/UndeleteFolderRequest'
            examples:
              CloudresourcemanagerFoldersUndeleteRequestExample:
                summary: Default cloudresourcemanager.folders.undelete request
                x-microcks-default: true
                value: {}
      responses:
        '200':
          description: The folder has been restored from pending deletion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Folder'
              examples:
