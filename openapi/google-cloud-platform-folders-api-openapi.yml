      operationId: cloudresourcemanager.folders.undelete
      summary: Google Cloud Platform Undelete a Folder
      description: Cancels the deletion request for a folder. This method can only be called within the 30-day grace period. The caller must have the resourcemanager.folders.undelete permission on the folder.
      tags:
      - Folders
      parameters:
      - name: folderId
        in: path
        description: The resource name of the folder to undelete.
        required: true
        schema:
          type: string
        example: '500123'
      requestBody:
