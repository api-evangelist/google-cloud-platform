notes: >-
  Google Cloud publishes a dated changelog per product (feed at
  cloud.google.com/<product>/docs/release-notes) plus an aggregated feed at
  cloud.google.com/release-notes filterable by product and release type
  (Feature, Changed, Fixed, Deprecated, Breaking, Announcement, Issue,
  Libraries, Security). Recent-window entries are not enumerated here to avoid
  fabricating dated rows; the live feed is the source of truth.
